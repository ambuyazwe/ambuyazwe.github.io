<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Andile Mbuyazwe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background: var(--color-bg);
    }
    .error-code {
      font-size: 8rem;
      font-weight: 700;
      letter-spacing: 8px;
      color: var(--color-border);
      line-height: 1;
      margin-bottom: 8px;
    }
    .error-title {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .error-text {
      color: var(--color-text-muted);
      font-size: 0.95rem;
      max-width: 400px;
      margin-bottom: 32px;
    }
    @media (max-width: 480px) {
      .error-code { font-size: 5rem; }
      .error-title { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="error-page">
    <p class="error-code">404</p>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-text">The page you're looking for doesn't exist or has been moved.</p>
    <a href="index.html" class="btn btn--dark">Back to Home</a>
  </div>
</body>
</html>
