images:
  - file: /gallery/05-digital-artwork/0100.avif
    title: Recruitment Post-card
    description: This is a typography/ communication design project. It is meant to help recruit people fight against emotional abuse in society. It is fully illustrated on Adobe Illustrator with no use of images, just vector shapes.
  - file: /gallery/05-digital-artwork/0200.avif
    title: Character Art - Sihle
    description: Illustration drawn for a client with the use of Photoshop.
  - file: /gallery/05-digital-artwork/0300.avif
    title: PhantomX
    description: My counterpart from an apocalyptic future or reality. I drew him with the inspiration of the mobile game; Marvel Contest of Champions. He's an emotionless Cyborg from the year 2099.
  - file: /gallery/05-digital-artwork/0400.avif
    title: One Piece Character Design
    description: I illustrator myself as a character in the world of One Piece.
  - file: /gallery/05-digital-artwork/0500.avif
    title: RageHawk - Andy Slots
    description: This illustration represents me and the environment I live in, in the future. I am in a Post-Apocalyptic/ fictional world called Brigg-City which is inspired by Bridgetown, an area near my home.
  - file: /gallery/05-digital-artwork/0600.avif
    title: Kevin McLovin
    description: A character I created for an assignment brief. It demanded me to create a Minecraft style character
  - file: /gallery/05-digital-artwork/0700.avif
    title: RageHawk1109 - Ninja
    description: A personal project illustrated on Photoshop. This aims to represent me in the world of the Scissor Seven anime.
  - file: /gallery/05-digital-artwork/0900.avif
    title: Inktober - Lust
    description: This artwork was heavily inspired by the concept of 'the seven deadly sins'; and this headless lady represents 'Lust'. She has no head, because Lust is all about wanting the body in this instance.
  - file: /gallery/05-digital-artwork/1000.avif
    title: Post Card - Post Emotional War
    description: With the use of Photoshop and Illustrator, I was able to design a dystopian postcard fighting against emotional abuse. It represents the results of emotional abuse with the use of skulls and darkness.
  - file: /gallery/05-digital-artwork/0800.avif
    title: Baby Minerva
    description: A representation of how one of my characters looked as a baby.
  - file: /gallery/05-digital-artwork/1100.avif
    title: Minerva
    description: Minerva is a fictional character I created for a graphic novel. She carries with her a flute possessed with her father's spirit; as she travels and plays music around the world for free.
  - file: /gallery/05-digital-artwork/1200.avif
    title: The Pixel Crew
    description: It was an assignement brief that demanded me to create characters of a different skin tone, clothing items and hairstyles.
  - file: /gallery/05-digital-artwork/1300.avif
    title: Your Highness
    description: A sketch I one made for Inktober and digitally drawn for a t-shirt design.
  - file: /gallery/05-digital-artwork/1400.avif
    title: Mzansi Battle Royale Game UI
    description: Portfolio piecFor this project I was tasked to invent and promote a video game. The video game is based in South Africa and the characters are South African celebrities. The original artwork was done by Kadi Sabi (https://ello.co/kadi_sabi) and I edited and made use of his artwork to create a fighting game interface.e by Andile Mbuyazwe
  - file: /gallery/05-digital-artwork/1500.avif
    title: RageHawk1109 - Project Me
    description: Made this illustration as a practice of my line art and converting myself into a cartoon.
  - file: /gallery/05-digital-artwork/1600.avif
    title: RageHawk - Andy Slots
    description: This illustration represents me and the environment I live in, in the future. I am in a Post-Apocalyptic/ fictional world called Brigg-City which is inspired by Bridgetown, an area near my home.
  - file: /gallery/05-digital-artwork/1700.avif
    title: Scottie. P
    description: Tasked with creating a mascot for the university I attended, I came up with Scottie. P; someone's pet that follows them to school so much that the school made him their official mascot.
  - file: /gallery/05-digital-artwork/1800.avif
    title: Storage Kicks Logo
    description: A logo I designed for a client of mine on Adobe Illustrator.
  - file: /gallery/05-digital-artwork/1900.avif
    title: Inktober - Crystal
    description: I made this illustration for the first day's theme of Inktober which was themed 'Crystal'.
  - file: /gallery/05-digital-artwork/2000.avif
    title: Utopian Postcard
    description: This is a post-card I designed for a Utopian themed campaign. Heavily inspired by the Christian Bible; It's function is to promote spiritual growth.
  - file: /gallery/05-digital-artwork/2100.avif
    title: Explicit Content
    description: A sketch I did of myself in the anime art style on Photoshop.
  - file: /gallery/05-digital-artwork/2200.avif
    title: Afro-Tan Packaging
    description: This illustration was for a hair product's packaging concept.
