    description: A Pick n Pay engagement post asking the viewer what kind of berries they like.
  - file: /gallery/03-social-media/1200.avif
    title: Pick n Pay Zambia - How Do You Enjoy Your Eggs?
    description: A Pick n Pay engagement post asking the viewers how they like their eggs.
  - file: /gallery/03-social-media/1600.avif
    title: Pick n Pay Zambia - Build Your Dream Sandwich
    description: A Pick n Pay engagement post I did asking the viewers what they like or what they would include in their dream sandwich.
