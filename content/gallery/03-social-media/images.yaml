    title: Online Car Parts - Fuel Injector Post
    description: Sale for a car part. The design choice was meant to bring out the quality of the price.
  - file: /gallery/03-social-media/0200.avif
    title: Online Car Parts - Make a Wish Post
    description: This was inspired by making a wish. The Aims to show you that you can acquire any part you wish for from the company, to show that the company is ready to grant your wishes.
  - file: /gallery/03-social-media/0300.avif
    title: Online Car Parts - Product Specials
    description: A poster advertising globe/ light specials at Online Car Parts.
  - file: /gallery/03-social-media/0500.avif
    title: Online Car Parts - Engine Oil Post
    description: An Instagram post I did for the in-store engine oil for sale.
  - file: /gallery/03-social-media/0700.avif
    title: Online Car Parts - Services Post
    description: Deeply inspired by doodle drawings to show/ indicate the company's services.
  - file: /gallery/03-social-media/0800.avif
    title: Online Car Parts - Contact Us Post
    description: I did this with the inspiration of movie posters in mind. This post aims to show that the company is within reach to all customers or clients.
  - file: /gallery/03-social-media/0900.avif
    title: Online Car Parts - Infographic Post
    description: The advert aims to show the client that whatever car problem they have, Online Car Parts can help. A way of exercising my typography skills by using hierarchy to the text.
  - file: /gallery/03-social-media/1300.avif
    title: Car Parts Bulk Sale Post
    description: A infographic poster showcasing parts for sale for each vehicle displayed within the poster.
  - file: /gallery/03-social-media/1500.avif
    title: Online Car Parts - Fuel Injectors Wide Range
    description: Exercising my use of overlays and making the different shades of blue indicate the importance of the object in view. This post showcases the range of fuel injectors the company has to offer.
  - file: /gallery/03-social-media/1700.avif
    title: Online Car Parts - Explore Our Store
    description: This is inspired by the vast sea and exploring the undiscovered mysteries it has to offer. So I used this concept to entice the customer into visiting the store to discover what they have to offer.
  - file: /gallery/03-social-media/1800.avif
    title: Online Car Parts - The Future
    description: The future is welcoming the present into a new light or view in cars. Through Photoshop I was able to produce a visually engaging post showing the customers that the company is the future of cars/ car parts.
  - file: /gallery/03-social-media/1000.avif
    title: Royal Blue Reflective WorkSuit
    description: An infographic Facebook post for one of Telstone Trading's work suits. This post aims to showcase the product and materials used in the product to show how trustworthy it is.
  - file: /gallery/03-social-media/0400.avif
    title: Telstone Care Label Guide
    description: A fabric care label guide infographic post for Facebook. This was created to educate the viewers on what the care labels on clothing mean and how to handle their clothing when doing their laundry.
  - file: /gallery/03-social-media/1100.avif
    title: Products & Services Post
    description: This is a post made for Telstone Trading outlining some of their products and services.
  - file: /gallery/03-social-media/0600.avif
