    title: Andy Crips Still Render
    description: A still render showcasing all three flavors the Andy Crips will have available on launch.
  - file: /gallery/06-3d-drawing/0500.avif
    title: Andy Crips - Peri Peri Chicken
    description: 3D model of the Peri-Peri flavor for my made up brand; Andy Crisps. Modelled on Blender.
  - file: /gallery/06-3d-drawing/0200.avif
    title: 3D Bonaqua Flask (Close-up shot)
    description: Here I was tasked with 3D modeling a new type of packaging for an existing brand of which I chose to make use of Bonaqua.
  - file: /gallery/06-3d-drawing/1400.avif
    title: 3D Bonaqua Flask (Far shot)
    description: Here I was tasked with 3D modeling a new type of packaging for an existing brand of which I chose to make use of Bonaqua.
  - file: /gallery/06-3d-drawing/1200.avif
    title: Czar1109
    description: My nickname made in cardboard; 'CZAR'. Painted it with pixel video game characters I grew up exposed to.
  - file: /gallery/06-3d-drawing/0100.avif
    title: Shluthu Hair Product Packaging
    description: A packaging I made out of cardboard. The graphics and artwork were done on illustrator.
  - file: /gallery/06-3d-drawing/0400.avif
    title: Sensei Bushido
    description: Line artwork of Bushido Brown from Boondocks.
  - file: /gallery/06-3d-drawing/0600.avif
    title: Inktober - Corn
    description: I experimented with corn and drew a character out of the concept. This was also a chance at trying a new animation style.
  - file: /gallery/06-3d-drawing/0700.avif
    title: Bafo Character Design
    description: Bafo is a fictional powerhouse character I came up with for my graphic novel. He is inspired by an old friend of mine.
  - file: /gallery/06-3d-drawing/0800.avif
    title: Inktober Day 3 - Roasted
    description: A sketch of what I thought the theme "Roasted" should portray. I personally call this artwork "Rooster Balboa".
  - file: /gallery/06-3d-drawing/0900.avif
    title: Inktober - Sup'Boy
    description: Inktober - Sup'Boy
  - file: /gallery/06-3d-drawing/1000.avif
    title: Spider Gwen
    description: Line art of one of my favourite versions of Spider-Man.
  - file: /gallery/06-3d-drawing/1100.avif
    title: Vinsmoke 66
    description: For an Inktober theme; I decided to draw my favourite Straw Hat from One Piece, Vinsmoke Sanji.
  - file: /gallery/06-3d-drawing/1300.avif
    title: Scheming Villain
    description: As a person inspired by villain backstories, I decided to be my own villain and illustrate myself as one.
  - file: /gallery/06-3d-drawing/1500.avif
    title: Spartan Bart
    description: Tattoo sketch I drew for a client.
  - file: /gallery/06-3d-drawing/1600.avif
    title: Gomu-Gomu-No
    description: As an illustrator, I love practicing different art techniques and character poses. Here I made use of Luffy from One Piece anime to practice the art of perspective.
  - file: /gallery/06-3d-drawing/1700.avif
    title: Dirt Sketch
    description: Hand-drawn illustration trying out a grunge out of the ordinary art style.
  - file: /gallery/06-3d-drawing/1800.avif
    title: Inktober - Swollen
    description: I used one of my favourite anime characters at their funniest moments to express the word 'swollen'
  - file: /gallery/06-3d-drawing/1900.avif
    title: Inktober Day 6 - Drooling
    description: Hand-drawn artwork of Homer drooling, because of substance use.
  - file: /gallery/06-3d-drawing/2000.avif
    title: Minerva Concep Art
    description: Hand-drawn concept art of Minerva.
