images:
  - file: /gallery/04-photography/0100.avif
    title: Mzansi Battle Royale - The Streets
    description: This is a promotional image for the game; and it aims to show the merging or collision of the two worlds. Created with the use of photographs and illustrations, I was able to combine both the Real and Pixel world together.
  - file: /gallery/04-photography/0200.avif
    title: Art Deco Tammy
    description: This is an edited photograph I Shot of my classmate. I made use of the Art deco movement as inspiration; and it was illustrated on Adobe illustrator.
  - file: /gallery/04-photography/0300.avif
    title: Amaskopas Alphabet
    description: I created a font using colored popcorn I bought from street vendors. I shaped them as letters so to shoot photographs of them and install the font on my PC for the use of the BOSS ZONKE Ricky Ricky bookcover.
  - file: /gallery/04-photography/0400.avif
    title: Grove Street
    description: Edited an image of me into the video game Grand Theft Auto San Andreas and Included the NPCs in the background.
  - file: /gallery/04-photography/0500.avif
    title: Mzansi Battle Royale Billboard Ad.
    description: This is a promotional advert for the game Mzansi Battle Royale. Created with the use of personally taken photographs, illustrations and mock-ups.
  - file: /gallery/04-photography/0600.avif
    title: Cliff Cabin
    description: Captured an image of a cabin in our backyard and blended it onto a cliff and added more assets like the  the people and birds. I gave it a 'sunset theme'. The edit was made for WireStock which sells stock images.
  - file: /gallery/04-photography/0700.avif
    title: Black Nikes
    description: A graphic illustration for a client selling sneakers online.
  - file: /gallery/04-photography/0800.avif
    title: Horror Cabin
    description: Captured an image of a cabin in our backyard and blended it into a meadow and added a 'Horror theme' to it. The edit was made for WireStock which sells stock images.
  - file: /gallery/04-photography/0900.avif
    title: Aqua Life
    description: An image edited from a photograph I captured of a glass and ocean themed downloaded assets.
  - file: /gallery/04-photography/1000.avif
    title: Exotic
    description: I was going for a horror theme with this product post. Greatly inspired by Jaws.
  - file: /gallery/04-photography/1100.avif
    title: Rocket Drop Ship
    description: This is a photograph I shot and edited of a broken down bus. It's a drop ship meant to be used in Mzansi Battle Royale to descend into the map; inspired by Fortnite/ Rocket League.
  - file: /gallery/04-photography/1200.avif
    title: DROP
    description: An advert done for Instagram with material from my product photography.
  - file: /gallery/04-photography/1300.avif
    title: BOOM!
    description: An edit made on Photoshop with downloaded assets.
  - file: /gallery/04-photography/1400.avif
    title: Oily
    description: An advert done for instagram with a compilation of different images. Done on photoshop.
  - file: /gallery/04-photography/1600.avif
